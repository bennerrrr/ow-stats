<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}STATS.CMD{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ow: {
              orange: '#F99E1A',
              cyan:   '#00D4FF',
              blue:   '#4A90D9',
              dark:   '#0a0a0a',
              card:   '#111111',
              border: '#272727',
            },
            hll: {
              green:  '#4A6741',
              bright: '#8FBC4A',
            }
          },
          fontFamily: {
            mono: ['"SF Mono"', '"Cascadia Code"', '"Fira Code"', 'Consolas', '"DejaVu Sans Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0a0a; color: #d4d4d4; font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, "DejaVu Sans Mono", monospace; }

    /* Status indicator */
    @keyframes status-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(68,255,136,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(68,255,136,0); }
    }
    .status-live { animation: status-pulse 2s ease-in-out infinite; }

    /* Glow on critical stats */
    .glow-orange { text-shadow: 0 0 12px rgba(249,158,26,0.5); }
    .glow-cyan   { text-shadow: 0 0 12px rgba(0,212,255,0.45); }
    .glow-green  { text-shadow: 0 0 12px rgba(143,188,74,0.45); }
    .glow-red    { text-shadow: 0 0 8px rgba(248,113,113,0.45); }

    /* Stat progress bar */
    .stat-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; margin-top: 5px; }
    .stat-bar-fill { height: 100%; border-radius: 1px; }

    /* Section header — label + extending rule */
    .hud-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .hud-section-header h2 {
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #555;
      white-space: nowrap;
    }
    .hud-section-header::after { content: ''; flex: 1; height: 1px; background: #1e1e1e; }

    /* Rank badge */
    .rank-badge { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

    /* Missile lock-on hover effect */
    @keyframes lock-on {
      0%   { box-shadow: 0 0 0 1px rgba(255,50,50,1), 0 0 20px rgba(255,50,50,0.7); }
      100% { box-shadow: 0 0 0 1px rgba(255,50,50,0.6), 0 0 8px rgba(255,50,50,0.15); }
    }
    .lock-target:hover { animation: lock-on 0.4s ease-out forwards; }
    .lock-target:active { animation: none; transform: scale(0.98); box-shadow: 0 0 0 1px rgba(255,50,50,0.95), 0 0 14px rgba(255,50,50,0.45); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  {% set _path = request.url.path %}
  <nav style="background:#0d0d0d;border-bottom:1px solid #1e1e1e;"
    class="px-6 py-3 flex items-center gap-4 sticky top-0 z-20">
    <a href="/" class="text-ow-orange font-bold text-sm tracking-widest uppercase shrink-0">
      ⬡ STATS.CMD
    </a>
    <div class="flex gap-1 ml-auto">
      <a href="/overwatch"
        style="{% if _path.startswith('/overwatch') %}border-color:#F99E1A;color:#F99E1A;background:rgba(249,158,26,0.06);{% else %}border-color:transparent;color:#666;{% endif %}"
        class="px-3 py-1 text-xs font-bold uppercase tracking-wider border transition-colors hover:text-ow-orange">
        ⚔ OW2
      </a>
      <a href="/hll"
        style="{% if _path.startswith('/hll') %}border-color:#8FBC4A;color:#8FBC4A;background:rgba(143,188,74,0.06);{% else %}border-color:transparent;color:#666;{% endif %}"
        class="px-3 py-1 text-xs font-bold uppercase tracking-wider border transition-colors hover:text-hll-bright">
        🪖 HLL
      </a>
      <a href="/leaderboard"
        style="{% if _path.startswith('/leaderboard') %}border-color:#00D4FF;color:#00D4FF;background:rgba(0,212,255,0.06);{% else %}border-color:transparent;color:#666;{% endif %}"
        class="px-3 py-1 text-xs font-bold uppercase tracking-wider border transition-colors hover:text-ow-cyan">
        ⊞ BOARD
      </a>
      <span class="w-px h-3.5 self-center mx-0.5" style="background:#222;"></span>
      <a href="/utils"
        style="{% if _path.startswith('/utils') %}border-color:#666;color:#aaa;background:rgba(170,170,170,0.05);{% else %}border-color:transparent;color:#444;{% endif %}"
        class="px-3 py-1 text-xs font-bold uppercase tracking-wider border transition-colors hover:text-gray-400">
        ⚙ UTILS
      </a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <div style="position:fixed;bottom:12px;right:16px;font-size:0.6rem;letter-spacing:0.12em;color:#333;pointer-events:none;user-select:none;display:flex;align-items:center;gap:6px;">
    {{ app_version }}
    {% if app_version_outdated %}
    <span style="color:#ef4444;letter-spacing:0.1em;" title="{{ app_version_latest }} available">● UPDATE</span>
    {% endif %}
  </div>

</body>
</html>
